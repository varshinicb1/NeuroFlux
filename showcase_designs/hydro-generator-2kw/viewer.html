                const canvas = document.getElementById('view');
                const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x101418);
                const camera = new THREE.PerspectiveCamera(
                  45,
                  canvas.clientWidth / canvas.clientHeight,
                  0.001,
                  10
                );
                camera.position.set(sceneData.camera.x, sceneData.camera.y, sceneData.camera.z);
                camera.lookAt(0, 0, 0);
                scene.add(new THREE.AmbientLight(0xffffff, 0.75));
                const light = new THREE.DirectionalLight(0xffffff, 1.8);
                light.position.set(1, -1, 2);
                scene.add(light);
                for (const mesh of sceneData.meshes) {
                  const color = new THREE.Color(mesh.color);
                  let object;
                  if (mesh.kind === 'magnet') {
                    object = new THREE.Mesh(
                      new THREE.BoxGeometry(
                        mesh.dimensions.radial_width,
                        mesh.dimensions.arc_width,
                        mesh.dimensions.thickness
                      ),
                      new THREE.MeshStandardMaterial({ color, metalness: 0.15, roughness: 0.45 })
                    );
                    const r = mesh.dimensions.radius;
                    const a = mesh.dimensions.angle_rad;
                    object.position.set(Math.cos(a) * r, Math.sin(a) * r, mesh.transform.z || 0);
                    object.rotation.z = a;
                  } else {
                    object = new THREE.Mesh(
                      new THREE.CylinderGeometry(
                        mesh.dimensions.outer_radius,
                        mesh.dimensions.outer_radius,
                        mesh.dimensions.thickness,
                        96
                      ),
                      new THREE.MeshStandardMaterial({ color, metalness: 0.35, roughness: 0.38 })
                    );
                    object.rotation.x = Math.PI / 2;
                    object.position.z = mesh.transform.z || 0;
                  }
                  scene.add(object);
                }
                function animate() {
                  scene.rotation.z += 0.002;
                  renderer.render(scene, camera);
                  requestAnimationFrame(animate);
                }
                animate();
