name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run smoke test
      run: python smoke_test.py

    - name: Run tests with pytest
      run: pytest -v --tb=short

    - name: Generate sample design
      run: |
        python -m neuroflux.lab.cli design \
          --name ci-test-design \
          --target-power-w 250 \
          --target-speed-rpm 600 \
          --target-voltage-v 48 \
          --max-outer-diameter-m 0.32 \
          --min-efficiency 0.50 \
          --iterations 2 \
          --num-candidates 3 \
          --output ci_designs

    - name: Upload design artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: design-artifacts-${{ matrix.os }}-py${{ matrix.python-version }}
        path: ci_designs/

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Lint with ruff
      run: ruff check neuroflux/ tests/

    - name: Check formatting
      run: ruff format --check neuroflux/ tests/
